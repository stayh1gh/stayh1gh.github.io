<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Bruno Paradas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
  <script>
    // Apply saved theme before paint to avoid a flash of the wrong theme.
    try {
      if (localStorage.getItem("theme") === "light") {
        document.documentElement.setAttribute("data-theme", "light");
      }
    } catch (e) {}
  </script>
</head>
<body class="project-page">
  <header class="navbar-zone wrap wrap--narrow">
    <div class="navbar">
      <a class="logo" href="index.html">bruno.</a>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light and dark theme">
        <svg class="icon-sun" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
        </svg>
      </button>
      <a class="btn" href="mailto:bruno.paradas1@gmail.com">Contact me</a>
    </div>
  </header>

  <main id="project-main"></main>

  <footer class="footer">
    <div class="wrap">
      <div class="cta-row">
        <h2>Let's work together</h2>
        <a class="btn btn--lg" href="mailto:bruno.paradas1@gmail.com">Contact me</a>
      </div>
      <div class="links">
        <div id="social-links"></div>
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/project.js"></script>
</body>
</html>
